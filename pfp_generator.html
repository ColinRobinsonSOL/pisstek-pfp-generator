<script>
const cv = document.getElementById('c');
const x = cv.getContext('2d');
let gc = 0;
const $ = id => document.getElementById(id).value;

// ============================================================
// CORE DRAWING — clean confident lines like Procreate/tablet
// ============================================================

function ln(x1,y1,x2,y2,w=2.5,c='#000'){
  x.strokeStyle=c;x.lineWidth=w;x.lineCap='round';x.lineJoin='round';
  x.beginPath();x.moveTo(x1,y1);x.lineTo(x2,y2);x.stroke();
}
function el(cx,cy,rx,ry,f,o=true,w=2.5){
  x.beginPath();x.ellipse(cx,cy,Math.max(1,rx),Math.max(1,ry),0,0,Math.PI*2);
  if(f){x.fillStyle=f;x.fill();}
  if(o){x.strokeStyle='#000';x.lineWidth=w;x.stroke();}
}
function ci(cx,cy,r,f,o=true,w=2.5){el(cx,cy,r,r,f,o,w);}
function pg(pts,f,o=true,w=2.5){
  x.beginPath();pts.forEach((p,i)=>i===0?x.moveTo(p[0],p[1]):x.lineTo(p[0],p[1]));
  x.closePath();if(f){x.fillStyle=f;x.fill();}
  if(o){x.strokeStyle='#000';x.lineWidth=w;x.stroke();}
}

// Cross-hatch skin texture marks
function tex(cx,cy,w,h,n=8){
  x.strokeStyle='rgba(0,0,0,0.08)';x.lineWidth=0.8;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI;
    const px=cx+(Math.random()-0.5)*w*0.8;
    const py=cy+(Math.random()-0.5)*h*0.8;
    const l=3+Math.random()*7;
    x.beginPath();
    x.moveTo(px-Math.cos(a)*l/2,py-Math.sin(a)*l/2);
    x.lineTo(px+Math.cos(a)*l/2,py+Math.sin(a)*l/2);
    x.stroke();
  }
}

// ============================================================
// THE GOBLIN — one continuous organic bean shape
// Studied from 13 reference images of PissTek art
// Head and body are ONE flowing form
// ============================================================

function drawGoblin(cx, skin, bodyType, face, hat, gear, sockStyle, pingStyle, isP, pose) {
  pose = pose || 'plotting';

  // --- PROPORTIONS — recalibrated against reference art ---
  // Key: head should be BIG (dominates), body round/squat, legs short
  let headR, bodyW, bodyH, headY, bodyY, legLen;

  if (bodyType === 'normal') {
    // Bigger head, squatter body — matches reference images
    headR = 60; bodyW = 42; bodyH = 44; headY = 138; bodyY = 230; legLen = 52;
  } else if (bodyType === 'tall') {
    headR = 52; bodyW = 36; bodyH = 62; headY = 112; bodyY = 225; legLen = 62;
  } else if (bodyType === 'thicc') {
    headR = 56; bodyW = 68; bodyH = 50; headY = 140; bodyY = 245; legLen = 50;
  } else if (bodyType === 'smol') {
    headR = 62; bodyW = 28; bodyH = 26; headY = 168; bodyY = 270; legLen = 38;
  } else { // sumo
    headR = 52; bodyW = 82; bodyH = 64; headY = 128; bodyY = 255; legLen = 44;
  }

  const legBase = bodyY + bodyH * 0.8;

  // === CAPE behind (draw before body) ===
  if (gear === 'cape') {
    x.beginPath();
    x.moveTo(cx - bodyW + 5, bodyY - bodyH * 0.3);
    x.quadraticCurveTo(cx - bodyW - 30, bodyY + 15, cx - bodyW - 15, legBase + legLen + 5);
    x.lineTo(cx + bodyW + 15, legBase + legLen + 5);
    x.quadraticCurveTo(cx + bodyW + 30, bodyY + 15, cx + bodyW - 5, bodyY - bodyH * 0.3);
    x.fillStyle = '#FFD700'; x.fill();
    x.strokeStyle = '#000'; x.lineWidth = 2.5; x.stroke();
    x.fillStyle = '#000'; x.font = 'bold 30px sans-serif'; x.textAlign = 'center';
    x.fillText('P', cx, bodyY + 12);
  }

  // === THIN NOODLE LEGS — short, stick-like ===
  const ll = cx - bodyW * 0.28;
  const rl = cx + bodyW * 0.28;
  ln(ll, legBase, ll - 2, legBase + legLen, 3);
  ln(rl, legBase, rl + 2, legBase + legLen, 3);

  // === MISMATCHED SOCKS — chunky ankle blocks ===
  if (sockStyle !== 'none') {
    const lc = sockStyle === 'mismatch' ? '#7CCC2E' : sockStyle === 'green' ? '#7CCC2E' : '#5B9BD5';
    const rc = sockStyle === 'mismatch' ? '#5B9BD5' : sockStyle === 'green' ? '#7CCC2E' : '#5B9BD5';
    // Left sock — chunky block like in references
    const st = legBase + legLen - 12, sb = legBase + legLen + 14;
    x.beginPath();
    x.moveTo(ll - 11, st); x.lineTo(ll - 11, sb);
    x.lineTo(ll + 12, sb); x.lineTo(ll + 12, st);
    x.closePath();
    x.fillStyle = lc; x.fill(); x.strokeStyle = '#000'; x.lineWidth = 2; x.stroke();
    // Sock fold line near top
    ln(ll - 11, st + 6, ll + 12, st + 6, 1, 'rgba(0,0,0,0.15)');
    // Right sock — chunky block
    x.beginPath();
    x.moveTo(rl - 12, st); x.lineTo(rl - 12, sb);
    x.lineTo(rl + 11, sb); x.lineTo(rl + 11, st);
    x.closePath();
    x.fillStyle = rc; x.fill(); x.strokeStyle = '#000'; x.lineWidth = 2; x.stroke();
    ln(rl - 12, st + 6, rl + 11, st + 6, 1, 'rgba(0,0,0,0.15)');
  }

  // === PINGLE — attached at groin, spread-limbed, drippy ===
  if (pingStyle !== 'none') {
    const px = cx, py = legBase;
    // Stem connecting to body
    ln(px, py - 12, px, py - 2, 2.5, '#C88080');
    // Body blob — fatter
    x.beginPath();
    x.ellipse(px, py + 10, 14, 15, 0, 0, Math.PI * 2);
    x.fillStyle = '#F0A0B0'; x.fill();
    x.strokeStyle = '#000'; x.lineWidth = 2; x.stroke();
    // Spread arms (tiny)
    ln(px - 14, py + 8, px - 26, py + 2, 2);
    ln(px + 14, py + 8, px + 26, py + 4, 2);
    ci(px - 26, py + 2, 3, '#F0A0B0', true, 1.5);
    ci(px + 26, py + 4, 3, '#F0A0B0', true, 1.5);
    // Spread legs (tiny)
    ln(px - 6, py + 23, px - 12, py + 34, 2);
    ln(px + 6, py + 23, px + 12, py + 34, 2);
    ci(px - 12, py + 34, 2.5, '#F0A0B0', true, 1.5);
    ci(px + 12, py + 34, 2.5, '#F0A0B0', true, 1.5);
    // Drips — longer, more of them, teardrop shaped
    for (let d = 0; d < 6; d++) {
      const ddx = px - 10 + d * 4 + (Math.random() - 0.5) * 3;
      const dl = 12 + Math.random() * 14;
      const dw = 2.5 + Math.random() * 1.5;
      x.fillStyle = d % 2 === 0 ? '#E890A5' : '#F0A0B0';
      x.beginPath();
      // Teardrop: narrow top, round bottom
      x.moveTo(ddx, py + 24);
      x.bezierCurveTo(ddx - dw, py + 24 + dl * 0.4, ddx - dw * 1.5, py + 24 + dl * 0.8, ddx, py + 24 + dl);
      x.bezierCurveTo(ddx + dw * 1.5, py + 24 + dl * 0.8, ddx + dw, py + 24 + dl * 0.4, ddx, py + 24);
      x.fill();
    }
    // Face
    x.fillStyle = '#000';
    if (pingStyle === 'happy') {
      x.fillRect(px - 5, py + 6, 2.5, 2.5); x.fillRect(px + 3, py + 6, 2.5, 2.5);
      x.beginPath(); x.arc(px, py + 14, 4, 0, Math.PI);
      x.strokeStyle = '#000'; x.lineWidth = 1.5; x.stroke();
    } else if (pingStyle === 'angry') {
      x.fillRect(px - 5, py + 6, 3, 3); x.fillRect(px + 3, py + 6, 3, 3);
      ln(px - 7, py + 2, px - 3, py + 5, 1.5);
      ln(px + 7, py + 2, px + 3, py + 5, 1.5);
      ln(px - 4, py + 16, px + 4, py + 17, 1.5);
    } else if (pingStyle === 'splat') {
      x.fillRect(px - 4, py + 7, 2.5, 2.5); x.fillRect(px + 2, py + 7, 2.5, 2.5);
      ln(px - 3, py + 15, px + 3, py + 15, 1.5);
    } else {
      // Normal — deadpan
      x.fillRect(px - 5, py + 6, 2.5, 2.5); x.fillRect(px + 3, py + 6, 2.5, 2.5);
      ln(px - 3, py + 14, px + 3, py + 14, 1.5);
    }
  }

  // === ARMS — POSE BASED ===
  const shoulderY = bodyY - bodyH * 0.12;

  if (pose === 'plotting') {
    // === THE ICONIC PISSTEK POSE: arms bent in, hands clasped at belly ===
    // Left arm: shoulder → elbow (slightly out) → hand (center-belly)
    x.beginPath(); x.strokeStyle = '#000'; x.lineWidth = 3; x.lineCap = 'round';
    x.moveTo(cx - bodyW + 2, shoulderY);
    x.quadraticCurveTo(cx - bodyW - 10, shoulderY + 28, cx - 14, bodyY + 10);
    x.stroke();
    // Right arm: shoulder → elbow (slightly out) → hand (center-belly)
    x.beginPath();
    x.moveTo(cx + bodyW - 2, shoulderY);
    x.quadraticCurveTo(cx + bodyW + 10, shoulderY + 28, cx + 14, bodyY + 10);
    x.stroke();
    // Clasped hands — overlapping oval blob at center-belly
    el(cx, bodyY + 10, 20, 11, skin, true, 2.5);
    // Finger knuckle lines across clasped hands
    x.strokeStyle = 'rgba(0,0,0,0.25)'; x.lineWidth = 1;
    for (let f = -3; f <= 3; f++) {
      x.beginPath();
      x.moveTo(cx + f * 5, bodyY + 4);
      x.lineTo(cx + f * 5, bodyY + 16);
      x.stroke();
    }
  } else if (pose === 'arms') {
    // Original arms-out pose
    const armY = bodyY - bodyH * 0.05;
    const lhx = cx - bodyW - 22, lhy = armY + 28;
    x.beginPath(); x.strokeStyle = '#000'; x.lineWidth = 2.5; x.lineCap = 'round';
    x.moveTo(cx - bodyW + 2, armY);
    x.quadraticCurveTo(cx - bodyW - 8, armY + 12, lhx, lhy);
    x.stroke();
    ci(lhx, lhy, 5, skin, true, 2);
    ln(lhx - 4, lhy - 2, lhx - 8, lhy - 5, 1.2);
    ln(lhx - 5, lhy + 1, lhx - 9, lhy, 1.2);
    ln(lhx - 3, lhy + 4, lhx - 7, lhy + 5, 1.2);
    const rhx = cx + bodyW + 22, rhy = armY + 20;
    x.beginPath(); x.strokeStyle = '#000'; x.lineWidth = 2.5;
    x.moveTo(cx + bodyW - 2, armY);
    x.quadraticCurveTo(cx + bodyW + 8, armY + 8, rhx, rhy);
    x.stroke();
    ci(rhx, rhy, 5, skin, true, 2);
    ln(rhx + 4, rhy - 2, rhx + 8, rhy - 5, 1.2);
    ln(rhx + 5, rhy + 1, rhx + 9, rhy, 1.2);
    ln(rhx + 3, rhy + 4, rhx + 7, rhy + 5, 1.2);
  } else if (pose === 'victory') {
    // Left arm hangs slightly down
    const lhx = cx - bodyW - 12, lhy = shoulderY + 45;
    x.beginPath(); x.strokeStyle = '#000'; x.lineWidth = 2.5; x.lineCap = 'round';
    x.moveTo(cx - bodyW + 2, shoulderY);
    x.quadraticCurveTo(cx - bodyW - 5, shoulderY + 22, lhx, lhy);
    x.stroke();
    ci(lhx, lhy, 5, skin, true, 2);
    // Right arm raised triumphantly
    const rhx = cx + bodyW + 18, rhy = shoulderY - 40;
    x.beginPath(); x.lineWidth = 2.5;
    x.moveTo(cx + bodyW - 2, shoulderY);
    x.quadraticCurveTo(cx + bodyW + 22, shoulderY - 22, rhx, rhy);
    x.stroke();
    ci(rhx, rhy, 5, skin, true, 2);
    ln(rhx + 2, rhy - 5, rhx + 5, rhy - 9, 1.2);
    ln(rhx + 5, rhy - 2, rhx + 9, rhy - 4, 1.2);
    ln(rhx - 2, rhy - 5, rhx - 5, rhy - 9, 1.2);
  } else if (pose === 'hips') {
    // Both arms bent outward, fists on hips
    x.beginPath(); x.strokeStyle = '#000'; x.lineWidth = 2.5; x.lineCap = 'round';
    x.moveTo(cx - bodyW + 2, shoulderY);
    x.quadraticCurveTo(cx - bodyW - 18, shoulderY + 15, cx - bodyW - 14, shoulderY + 38);
    x.stroke();
    ci(cx - bodyW - 14, shoulderY + 38, 5, skin, true, 2);
    x.beginPath();
    x.moveTo(cx + bodyW - 2, shoulderY);
    x.quadraticCurveTo(cx + bodyW + 18, shoulderY + 15, cx + bodyW + 14, shoulderY + 38);
    x.stroke();
    ci(cx + bodyW + 14, shoulderY + 38, 5, skin, true, 2);
  }

  // === MAIN BODY — one continuous organic bean shape ===
  // Head massive, body round/squat, minimal neck — matches reference
  x.beginPath();
  x.moveTo(cx - bodyW * 0.48, legBase);
  // Left body up — push control point out for rounder avocado bulge
  x.quadraticCurveTo(cx - bodyW - 14, bodyY + bodyH * 0.15, cx - bodyW * 0.72, bodyY - bodyH * 0.52);
  // Smooth shoulder-to-head transition (no sharp neck)
  x.quadraticCurveTo(cx - headR * 0.65, headY + headR * 0.52, cx - headR * 0.68, headY);
  // Left head arc up to top
  x.quadraticCurveTo(cx - headR * 0.88, headY - headR * 0.92, cx - headR * 0.18, headY - headR);
  // Crown of head (slightly flat on top — like reference)
  x.quadraticCurveTo(cx, headY - headR * 1.05, cx + headR * 0.18, headY - headR);
  // Right head arc
  x.quadraticCurveTo(cx + headR * 0.88, headY - headR * 0.92, cx + headR * 0.68, headY);
  // Smooth transition back to shoulder
  x.quadraticCurveTo(cx + headR * 0.65, headY + headR * 0.52, cx + bodyW * 0.72, bodyY - bodyH * 0.52);
  // Right body down — matching bulge
  x.quadraticCurveTo(cx + bodyW + 14, bodyY + bodyH * 0.15, cx + bodyW * 0.48, legBase);
  // Crotch curve — wider/rounder bottom
  x.quadraticCurveTo(cx + bodyW * 0.18, legBase + 12, cx, legBase + 6);
  x.quadraticCurveTo(cx - bodyW * 0.18, legBase + 12, cx - bodyW * 0.48, legBase);

  x.fillStyle = skin; x.fill();
  x.strokeStyle = '#000'; x.lineWidth = 3; x.stroke();

  // Subtle belly roundness shadow
  x.beginPath();
  x.strokeStyle = 'rgba(0,0,0,0.08)'; x.lineWidth = 1.2;
  x.arc(cx, bodyY + 2, bodyW * 0.52, 0.35, Math.PI - 0.35);
  x.stroke();

  // Skin texture
  tex(cx, bodyY, bodyW * 1.4, bodyH * 1.2, 14);
  tex(cx, headY, headR * 1.1, headR * 0.9, 7);

  // === EARS — small horizontal pointed stubs AT EYE LEVEL ===
  // In references: tiny points sticking out sideways at eye height, not above
  const earY = headY + headR * 0.05; // at roughly eye level
  // Left ear
  x.beginPath();
  x.moveTo(cx - headR * 0.72, earY - 6);
  x.lineTo(cx - headR * 0.72 - 20, earY + 2);
  x.lineTo(cx - headR * 0.72, earY + 8);
  x.closePath();
  x.fillStyle = skin; x.fill(); x.strokeStyle = '#000'; x.lineWidth = 2; x.stroke();
  // Right ear
  x.beginPath();
  x.moveTo(cx + headR * 0.72, earY - 6);
  x.lineTo(cx + headR * 0.72 + 20, earY + 2);
  x.lineTo(cx + headR * 0.72, earY + 8);
  x.closePath();
  x.fillStyle = skin; x.fill(); x.strokeStyle = '#000'; x.lineWidth = 2; x.stroke();

  // === THE NOSE — THE most defining feature ===
  // Long pointed beak/snout, protrudes far right, slightly downward curve
  // In references: prominent, angular, almost bird-like, dominates the face
  const noseBaseX = cx + headR * 0.48;
  const noseBaseY = headY + headR * 0.1; // slightly below face center (eye level-ish)
  x.beginPath();
  // Top edge: starts at face, curves out to sharp tip
  x.moveTo(noseBaseX, noseBaseY - 10);
  x.quadraticCurveTo(noseBaseX + 18, noseBaseY - 8, noseBaseX + 32, noseBaseY + 2);
  // Tip of nose (sharp point)
  x.quadraticCurveTo(noseBaseX + 30, noseBaseY + 10, noseBaseX + 20, noseBaseY + 14);
  // Underside back to face
  x.quadraticCurveTo(noseBaseX + 8, noseBaseY + 14, noseBaseX, noseBaseY + 6);
  x.closePath();
  x.fillStyle = skin; x.fill();
  x.strokeStyle = '#000'; x.lineWidth = 2.5; x.stroke();
  // Nostril — small dark oval near tip
  x.fillStyle = 'rgba(0,0,0,0.7)';
  x.beginPath(); x.ellipse(noseBaseX + 22, noseBaseY + 8, 2.5, 1.8, -0.3, 0, Math.PI * 2); x.fill();

  // === HEADWEAR ===
  drawHat(cx, headY, headR, hat);

  // === PISSTINA extras ===
  if (isP) {
    if (hat === 'none') drawHat(cx, headY, headR, 'pinkhair');
    x.fillStyle = 'rgba(255,140,140,0.35)';
    x.beginPath(); x.arc(cx - headR * 0.3, headY + headR * 0.18, 7, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(cx + headR * 0.3, headY + headR * 0.18, 7, 0, Math.PI * 2); x.fill();
  }

  // === FACE — eyes placed near center of face, NOT upper quarter ===
  // In reference: eyes are fairly low/centered on face, big brow angles
  const eyeY = headY - headR * 0.05; // near face center (was -0.15, too high)
  const eyeSpan = headR * 0.24;
  drawFace(cx, eyeY, headY + headR * 0.38, eyeSpan, face, headR);

  // === GEAR (front accessories) ===
  drawGear(cx, headY, bodyY, headR, bodyW, bodyH, gear, skin, legBase);

  // === SHIRT overlay ===
  if (gear === 'shirt') {
    el(cx, bodyY, bodyW + 2, bodyH * 0.8 + 2, '#111', true, 2);
    x.fillStyle = '#FFF'; x.font = 'bold 9px sans-serif'; x.textAlign = 'center';
    x.fillText('STOP', cx, bodyY - 8);
    x.fillText('BEING', cx, bodyY + 2);
    x.fillText('POOR', cx, bodyY + 12);
  }
}

// ============================================================
// FACE EXPRESSIONS
// ============================================================

function drawFace(cx, ey, my, sp, face, hR) {
  const lx = cx - sp, rx = cx + sp;

  if (face === 'angry') {
    // === ANGRY — THE most common Pisstek face ===
    // Heavy angled brows, small intense eyes, flat frown
    x.fillStyle = '#000';
    // Eyes — small solid dots, slightly squinted
    x.beginPath(); x.ellipse(lx, ey, 3.5, 3, 0, 0, Math.PI*2); x.fill();
    x.beginPath(); x.ellipse(rx, ey, 3.5, 3, 0, 0, Math.PI*2); x.fill();
    // Brows — thick angled lines, steep V shape toward center
    ln(lx - 10, ey - 13, lx + 6, ey - 6, 3.5);
    ln(rx + 10, ey - 13, rx - 6, ey - 6, 3.5);
    // Nose bridge crease between brows
    ln(cx - 3, ey - 8, cx + 3, ey - 8, 1.5, 'rgba(0,0,0,0.3)');
    // Eye shine highlights
    x.fillStyle = 'rgba(255,255,255,0.7)';
    x.beginPath(); x.arc(lx - 1, ey - 1, 1.2, 0, Math.PI*2); x.fill();
    x.beginPath(); x.arc(rx - 1, ey - 1, 1.2, 0, Math.PI*2); x.fill();
    // Flat tight frown — just a short horizontal line
    ln(cx - 7, my + 2, cx + 7, my + 2, 2.5);
    // Slight downturn at mouth corners
    ln(cx - 7, my + 2, cx - 9, my + 5, 1.5);
    ln(cx + 7, my + 2, cx + 9, my + 5, 1.5);
  } else if (face === 'smug') {
    // === SMUG — one eye open one squinting, crooked smirk ===
    // As seen in "ALL IN" image — both slightly narrowed, confident look
    x.fillStyle = '#000';
    // Left eye — thin horizontal squint
    ln(lx - 5, ey, lx + 5, ey, 3);
    // Right eye — half-closed squint
    x.beginPath(); x.ellipse(rx, ey, 4, 2.5, 0, 0, Math.PI*2); x.fill();
    // Brows — flatter than angry, slight tilt toward center
    ln(lx - 8, ey - 11, lx + 5, ey - 7, 3);
    ln(rx + 6, ey - 11, rx - 5, ey - 8, 2.5);
    // Smirk — one side only, curves up on right (wider)
    x.beginPath();
    x.moveTo(cx - 7, my + 3);
    x.quadraticCurveTo(cx + 4, my - 2, cx + 16, my - 5);
    x.strokeStyle = '#000'; x.lineWidth = 2.5; x.stroke();
  } else if (face === 'cry') {
    ci(lx, ey, 7, '#FFF'); ci(rx, ey, 7, '#FFF');
    x.fillStyle = '#000';
    x.beginPath(); x.arc(lx, ey + 1, 3.5, 0, Math.PI*2); x.fill();
    x.beginPath(); x.arc(rx, ey + 1, 3.5, 0, Math.PI*2); x.fill();
    ci(lx + 2, ey - 2, 1.5, '#FFF', false);
    ci(rx + 2, ey - 2, 1.5, '#FFF', false);
    x.fillStyle = '#69D2E7';
    for (let t = 0; t < 22; t += 4) {
      x.beginPath(); x.arc(lx - 2, ey + 9 + t, 1.5, 0, Math.PI*2); x.fill();
      x.beginPath(); x.arc(rx + 2, ey + 9 + t, 1.5, 0, Math.PI*2); x.fill();
    }
    el(cx, my + 3, 8, 6, '#300000');
  } else if (face === 'happy') {
    // Happy — upward arc eyes with pupils, big smile
    x.strokeStyle = '#000'; x.lineWidth = 2.5;
    x.beginPath(); x.arc(lx, ey + 2, 5, Math.PI*1.1, Math.PI*1.9); x.stroke();
    x.beginPath(); x.arc(rx, ey + 2, 5, Math.PI*1.1, Math.PI*1.9); x.stroke();
    // Pupils inside arc eyes
    x.fillStyle = '#000';
    x.beginPath(); x.arc(lx, ey + 1, 2, 0, Math.PI*2); x.fill();
    x.beginPath(); x.arc(rx, ey + 1, 2, 0, Math.PI*2); x.fill();
    x.beginPath(); x.arc(cx, my - 2, 9, 0.05, Math.PI - 0.05);
    x.strokeStyle = '#000'; x.lineWidth = 2.5; x.stroke();
  } else if (face === 'dead') {
    // Dead inside — heavy flat brows, x eyes, flat mouth
    ln(lx-10,ey-11,lx+6,ey-6,3.5); ln(rx+10,ey-11,rx-6,ey-6,3.5);
    // X eyes
    ln(lx-5,ey-5,lx+5,ey+5,2.5); ln(lx+5,ey-5,lx-5,ey+5,2.5);
    ln(rx-5,ey-5,rx+5,ey+5,2.5); ln(rx+5,ey-5,rx-5,ey+5,2.5);
    // Completely flat mouth
    ln(cx-9,my+2,cx+9,my+2,2.5);
  } else if (face === 'vampire') {
    ci(lx,ey,7,'#1a0505'); ci(rx,ey,7,'#1a0505');
    x.shadowColor='#F00';x.shadowBlur=12;
    ci(lx,ey,4,'#F22',false); ci(rx,ey,4,'#F22',false);
    x.shadowBlur=0;
    // Eye shine
    x.fillStyle='rgba(255,80,80,0.5)';
    x.beginPath();x.arc(lx-1,ey-2,1.5,0,Math.PI*2);x.fill();
    x.beginPath();x.arc(rx-1,ey-2,1.5,0,Math.PI*2);x.fill();
    x.beginPath(); x.arc(cx,my-3,11,0.12,Math.PI-0.12);
    x.strokeStyle='#000';x.lineWidth=2.5;x.stroke();
    // Thicker fangs with wider bases
    pg([[cx-6,my-1],[cx-2,my+10],[cx+1,my-1]],'#FFF',true,1.5);
    pg([[cx+6,my-1],[cx+2,my+10],[cx-1,my-1]],'#FFF',true,1.5);
  } else if (face === 'uwu') {
    // UwU — closed happy arc eyes with blush + cat mouth
    x.strokeStyle='#000';x.lineWidth=2.5;
    x.beginPath();x.arc(lx,ey,5,Math.PI*0.05,Math.PI*0.95);x.stroke();
    x.beginPath();x.arc(rx,ey,5,Math.PI*0.05,Math.PI*0.95);x.stroke();
    // Pupils peeking through
    x.fillStyle='#000';
    x.beginPath();x.arc(lx,ey+1,2,0,Math.PI*2);x.fill();
    x.beginPath();x.arc(rx,ey+1,2,0,Math.PI*2);x.fill();
    // Bigger more vibrant blush
    x.fillStyle='rgba(255,110,110,0.42)';
    x.beginPath();x.ellipse(lx-2,ey+11,8,5,0,0,Math.PI*2);x.fill();
    x.beginPath();x.ellipse(rx+2,ey+11,8,5,0,0,Math.PI*2);x.fill();
    x.beginPath();x.strokeStyle='#000';x.lineWidth=2;
    x.moveTo(cx-6,my+2);x.lineTo(cx,my-3);x.lineTo(cx+6,my+2);x.stroke();
  } else if (face === 'confused') {
    x.fillStyle='#000';x.beginPath();x.arc(lx,ey,3,0,Math.PI*2);x.fill();
    ci(rx,ey,5,'#FFF');
    x.fillStyle='#000';x.beginPath();x.arc(rx,ey,2.5,0,Math.PI*2);x.fill();
    ln(rx-6,ey-13,rx+6,ey-9,2.5);
    x.fillStyle='#000';x.font='bold 16px sans-serif';x.textAlign='center';
    x.fillText('?',cx+hR*0.55+14,ey-3);
    // Sweat drops
    x.fillStyle='#69D2E7';
    x.beginPath();x.arc(cx+hR*0.4,ey-hR*0.6,3,0,Math.PI*2);x.fill();
    x.beginPath();x.arc(cx-hR*0.2,ey-hR*0.75,2,0,Math.PI*2);x.fill();
    ln(cx-7,my+2,cx+7,my-1,2.5);
  } else if (face === 'laser') {
    x.fillStyle='#000';
    x.beginPath();x.arc(lx,ey,3,0,Math.PI*2);x.fill();
    x.beginPath();x.arc(rx,ey,3,0,Math.PI*2);x.fill();
    ln(lx-8,ey-12,lx+4,ey-6,2.5);
    ln(rx+8,ey-12,rx-4,ey-6,2.5);
    x.globalAlpha=0.8;
    const cw=cv.width;
    x.strokeStyle='#F00';x.lineWidth=5;
    x.beginPath();x.moveTo(lx,ey);x.lineTo(cw,ey+90);x.stroke();
    x.beginPath();x.moveTo(rx,ey);x.lineTo(cw,ey+65);x.stroke();
    x.strokeStyle='#FF6666';x.lineWidth=2;
    x.beginPath();x.moveTo(lx,ey);x.lineTo(cw,ey+90);x.stroke();
    x.beginPath();x.moveTo(rx,ey);x.lineTo(cw,ey+65);x.stroke();
    x.globalAlpha=1;
    x.shadowColor='#F00';x.shadowBlur=6;
    ci(lx,ey,4,'#F00',false);ci(rx,ey,4,'#F00',false);
    x.shadowBlur=0;
    ln(cx-7,my,cx+7,my+2,2);
  }
}

// ============================================================
// HEADWEAR
// ============================================================

function drawHat(cx, hy, hr, hat) {
  const top = hy - hr;
  if (hat === 'none') return;
  if (hat === 'tophat') {
    pg([[cx-hr*0.7-4,top+5],[cx+hr*0.7+4,top+5],[cx+hr*0.7+4,top+12],[cx-hr*0.7-4,top+12]],'#111');
    pg([[cx-hr*0.45,top-35],[cx+hr*0.45,top-35],[cx+hr*0.45,top+8],[cx-hr*0.45,top+8]],'#111');
  } else if (hat === 'crown') {
    x.beginPath();
    x.moveTo(cx-24,top+5);x.lineTo(cx-18,top-20);x.lineTo(cx-8,top-4);
    x.lineTo(cx,top-26);x.lineTo(cx+8,top-4);x.lineTo(cx+18,top-20);x.lineTo(cx+24,top+5);
    x.closePath();x.fillStyle='#FFD700';x.fill();x.strokeStyle='#000';x.lineWidth=2.5;x.stroke();
    ci(cx,top-13,3,'#F00');
  } else if (hat === 'halo') {
    x.strokeStyle='#FFD700';x.lineWidth=3;
    x.beginPath();x.ellipse(cx,top-8,22,6,0,0,Math.PI*2);x.stroke();
    x.shadowColor='#FFD700';x.shadowBlur=12;
    x.strokeStyle='#FFF200';x.lineWidth=1.5;
    x.beginPath();x.ellipse(cx,top-8,24,7,0,0,Math.PI*2);x.stroke();
    x.shadowBlur=0;
  } else if (hat === 'cap') {
    // Yellow baseball cap
    el(cx,top+5,hr*0.75+4,10,'#FFD700');
    // Brim pointing right
    x.beginPath();
    x.moveTo(cx+hr*0.5,top+8);
    x.quadraticCurveTo(cx+hr+15,top+10,cx+hr+20,top+14);
    x.quadraticCurveTo(cx+hr+15,top+18,cx+hr*0.5,top+14);
    x.fillStyle='#E6C200';x.fill();x.strokeStyle='#000';x.lineWidth=2;x.stroke();
  } else if (hat === 'horns') {
    x.beginPath();x.moveTo(cx-hr*0.5,top+8);
    x.quadraticCurveTo(cx-hr*0.5-12,top-22,cx-hr*0.5+14,top-16);
    x.closePath();x.fillStyle='#8B0000';x.fill();x.strokeStyle='#000';x.lineWidth=2;x.stroke();
    x.beginPath();x.moveTo(cx+hr*0.5,top+8);
    x.quadraticCurveTo(cx+hr*0.5+12,top-22,cx+hr*0.5-14,top-16);
    x.closePath();x.fillStyle='#8B0000';x.fill();x.strokeStyle='#000';x.lineWidth=2;x.stroke();
  } else if (hat === 'hardhat') {
    el(cx,top+5,hr*0.75+8,12,'#FFD700');
    pg([[cx-hr*0.5+4,top],[cx+hr*0.5-4,top],[cx+hr*0.5-6,top-18],[cx-hr*0.5+6,top-18]],'#FFD700');
    ci(cx,top-18,4,'#FFD700');
  } else if (hat === 'headband') {
    ln(cx-hr*0.65-3,top+hr*0.4,cx+hr*0.65+3,top+hr*0.4,5,'#CC0000');
    const kx=cx+hr*0.65+2,ky=top+hr*0.4;
    ln(kx,ky,kx+12,ky-9,4,'#CC0000');
    ln(kx,ky,kx+9,ky+6,4,'#CC0000');
  } else if (hat === 'viking') {
    el(cx,top+4,hr*0.65+3,13,'#888');
    ln(cx,top+2,cx,top+hr*0.55,2.5,'#777');
    // Curved horns
    x.beginPath();x.moveTo(cx-hr*0.6-1,top+6);
    x.quadraticCurveTo(cx-hr*0.6-20,top-8,cx-hr*0.6-8,top-28);
    x.strokeStyle='#DDD';x.lineWidth=6;x.lineCap='round';x.stroke();
    x.strokeStyle='#000';x.lineWidth=2;x.stroke();
    x.beginPath();x.moveTo(cx+hr*0.6+1,top+6);
    x.quadraticCurveTo(cx+hr*0.6+20,top-8,cx+hr*0.6+8,top-28);
    x.strokeStyle='#DDD';x.lineWidth=6;x.stroke();
    x.strokeStyle='#000';x.lineWidth=2;x.stroke();
  } else if (hat === 'pinkhair') {
    x.beginPath();
    x.moveTo(cx-hr*0.7,top+hr*0.7);
    x.quadraticCurveTo(cx-hr*0.8,top-3,cx,top-6);
    x.quadraticCurveTo(cx+hr*0.8,top-3,cx+hr*0.7,top+hr*0.7);
    x.quadraticCurveTo(cx+hr+8,top+hr*1.3,cx+hr+5,top+hr*2.1);
    x.lineTo(cx+hr*0.3,top+hr*1.6);
    x.lineTo(cx-hr*0.3,top+hr*1.6);
    x.lineTo(cx-hr-5,top+hr*2.1);
    x.quadraticCurveTo(cx-hr-8,top+hr*1.3,cx-hr*0.7,top+hr*0.7);
    x.fillStyle='#FF69B4';x.fill();x.strokeStyle='#000';x.lineWidth=2;x.stroke();
    // Jagged bangs
    x.beginPath();
    x.moveTo(cx-hr*0.5,top+hr*0.15);
    for(let i=0;i<6;i++){
      const bx=cx-hr*0.4+i*hr*0.16;
      x.lineTo(bx,top+hr*(0.3+((i%2)*0.15)));
    }
    x.strokeStyle='#E0508A';x.lineWidth=2;x.stroke();
  }
}

// ============================================================
// GEAR / ACCESSORIES
// ============================================================

function drawGear(cx, hy, by, hr, bw, bh, gear, skin, lb) {
  if (gear === 'none' || gear === 'cape' || gear === 'shirt') return;
  if (gear === 'sword') {
    // Sword held up in right hand area
    const sx=cx+bw+14,sy=hy-hr*0.5;
    // Blade
    x.beginPath();
    x.moveTo(sx,sy);x.lineTo(sx+3,sy-65);x.lineTo(sx+6,sy-70);
    x.lineTo(sx+9,sy-65);x.lineTo(sx+12,sy);
    x.closePath();x.fillStyle='#D0D8E0';x.fill();x.strokeStyle='#000';x.lineWidth=2;x.stroke();
    // Blade shine
    x.beginPath();x.moveTo(sx+4,sy-5);x.lineTo(sx+5,sy-60);
    x.strokeStyle='rgba(255,255,255,0.5)';x.lineWidth=1.5;x.stroke();
    // Guard
    pg([[sx-6,sy+2],[sx+18,sy+2],[sx+18,sy+6],[sx-6,sy+6]],'#C5960C',true,1.5);
    // Handle/grip
    pg([[sx+2,sy+6],[sx+10,sy+6],[sx+10,sy+22],[sx+2,sy+22]],'#5C3317',true,1.5);
    // Pommel
    ci(sx+6,sy+24,4,'#C5960C',true,1.5);
  } else if (gear === 'diamonds') {
    // Diamond piss stream — diamonds cascading from pingle area
    const dx=cx,dy=lb+30;
    for(let d=0;d<12;d++){
      const ddx=dx+(Math.random()-.5)*40;
      const ddy=dy+d*8+Math.random()*6;
      const ds=4+Math.random()*5;
      // Diamond shape
      x.beginPath();
      x.moveTo(ddx,ddy-ds);x.lineTo(ddx+ds,ddy);x.lineTo(ddx,ddy+ds*0.6);x.lineTo(ddx-ds,ddy);
      x.closePath();
      x.fillStyle=`hsl(${185+Math.random()*30},${70+Math.random()*30}%,${70+Math.random()*20}%)`;
      x.fill();x.strokeStyle='#000';x.lineWidth=1;x.stroke();
      // Sparkle
      x.fillStyle='rgba(255,255,255,0.7)';
      x.fillRect(ddx-1,ddy-ds*0.5,2,2);
    }
    // Pile of diamonds at bottom
    for(let p=0;p<18;p++){
      const px2=dx+(Math.random()-.5)*70;
      const py2=dy+95+Math.random()*15;
      const ps=5+Math.random()*6;
      x.beginPath();

  x.beginPath();

  x.closePath();

  // White stripes
  const s1=cy-h*0.1,s1w=bw*0.5;
  pg([[cx-s1w,s1-7],[cx+s1w,s1-7],[cx+s1w+2,s1+1],[cx-s1w-2,s1+1]],'#FFF',true,1.5);
  const s2=cy+h*0.16,s2w=bw*0.7;
  pg([[cx-s2w,s2-7],[cx+s2w,s2-7],[cx+s2w+2,s2+1],[cx-s2w-2,s2+1]],'#FFF',true,1.5);
  // Bowtie
  if(det){
    const bty=(s1+s2)/2;

    pg([[cx,bty],[cx+6,bty-4],[cx+6,bty+4]],'#93C',true,1.5);

  // Base
  pg([[cx-bw-5,cy+h*0.42],[cx+bw+5,cy+h*0.42],[cx+bw+5,cy+h*0.47],[cx-bw-5,cy+h*0.47]],'#FF6600');

    ln(tx-3,ty-2,tx+3,ty+2,0.8,'rgba(200,80,0,0.3)');
  }
  // Legs + socks
  if(det){
    const ly=cy+h*0.47;
    ln(cx-bw*0.25,ly,cx-bw*0.25,ly+22,2);
    ln(cx+bw*0.25,ly,cx+bw*0.25,ly+22,2);
    if(sockS!=='none'){
      const lc=sockS==='mismatch'?'#7CCC2E':sockS==='green'?'#7CCC2E':'#5B9BD5';
      const rc=sockS==='mismatch'?'#5B9BD5':sockS==='green'?'#7CCC2E':'#5B9BD5';
      x.beginPath();x.moveTo(cx-bw*0.25-5,ly+16);x.lineTo(cx-bw*0.25-6,ly+25);

      x.fillStyle=lc;x.fill();x.strokeStyle='#000';x.lineWidth=1.5;x.stroke();

      x.lineTo(cx+bw*0.25+7,ly+25);x.lineTo(cx+bw*0.25+5,ly+16);x.closePath();
      x.fillStyle=rc;x.fill();x.strokeStyle='#000';x.lineWidth=1.5;x.stroke();

    x.quadraticCurveTo(370,130,330,140);x.lineTo(90,140);x.quadraticCurveTo(50,130,40,170);
    x.fillStyle='#E8C8A8';x.fill();x.strokeStyle='#000';x.lineWidth=1.5;x.stroke();
    // Couch armrests
    x.beginPath();x.moveTo(40,170);x.quadraticCurveTo(20,180,25,260);x.lineTo(40,260);x.fillStyle='#E0C098';x.fill();x.strokeStyle='#000';x.lineWidth=1;x.stroke();
    x.beginPath();x.moveTo(380,170);x.quadraticCurveTo(400,180,395,260);x.lineTo(380,260);x.fillStyle='#E0C098';x.fill();x.strokeStyle='#000';x.lineWidth=1;x.stroke();
    // Floral pattern on couch
    for(let f=0;f<8;f++){
      const fx2=80+f*40,fy2=185+Math.random()*40;

  } else if(bg==='ruins'){

    x.fillStyle=g;x.fillRect(0,0,420,420);
    // Destroyed buildings silhouettes
    x.fillStyle='#1a1a15';
    // Left building
    pg([[0,90],[40,90],[40,60],[55,60],[55,40],[70,40],[70,80],[90,80],[90,320],[0,320]],'#1a1a15',false);
    // Right buildings
    pg([[320,70],[350,70],[350,50],[370,50],[370,65],[400,65],[400,100],[420,100],[420,320],[320,320]],'#1a1a15',false);
    // Middle ruins
    pg([[120,120],[145,120],[145,95],[160,95],[160,130],[180,130],[180,320],[120,320]],'#222218',false);
    pg([[240,100],[280,100],[280,110],[295,110],[295,85],[310,85],[310,320],[240,320]],'#222218',false);
    // Rubble ground
    x.fillStyle='#3a3a30';x.fillRect(0,300,420,120);
    // Rubble chunks
    for(let r=0;r<20;r++){

// ============================================================
// EFFECTS
// ============================================================

function drawFx(fx){
  if(fx==='none')return;
  if(fx==='P'){x.fillStyle='#000';x.font='bold 20px sans-serif';x.textAlign='center';
  for(let i=0;i<14;i++){x.globalAlpha=.25+Math.random()*.5;x.fillText('P',25+Math.random()*370,25+Math.random()*370);}x.globalAlpha=1;}
  else if(fx==='hearts'){for(let i=0;i<10;i++){const hx=25+Math.random()*370,hy=25+Math.random()*370,s=5+Math.random()*7;
  x.fillStyle=`hsl(${340+Math.random()*25},80%,${55+Math.random()*25}%)`;
  x.beginPath();x.moveTo(hx,hy+s*.3);x.bezierCurveTo(hx-s,hy-s*.5,hx-s*1.4,hy+s*.2,hx,hy+s);
  x.bezierCurveTo(hx+s*1.4,hy+s*.2,hx+s,hy-s*.5,hx,hy+s*.3);x.fill();}}
  else if(fx==='fire'){for(let i=0;i<12;i++){const fx2=40+Math.random()*340,fy=340+Math.random()*55,fs=7+Math.random()*14;
  x.beginPath();x.moveTo(fx2,fy);x.quadraticCurveTo(fx2-fs/2,fy-fs,fx2,fy-fs*1.4);
  x.quadraticCurveTo(fx2+fs/2,fy-fs,fx2,fy);x.fillStyle=`hsl(${15+Math.random()*28},100%,${48+Math.random()*22}%)`;x.fill();}}
  else if(fx==='money'){x.fillStyle='#FFD700';x.font='bold 13px sans-serif';x.textAlign='center';
  for(let i=0;i<12;i++){x.globalAlpha=.35+Math.random()*.5;x.fillText('$PISS',25+Math.random()*370,15+Math.random()*390);}x.globalAlpha=1;}
  else if(fx==='zap'){for(let i=0;i<3;i++){const lx=40+Math.random()*340,ly=10+Math.random()*40;
  x.strokeStyle='#FFD700';x.lineWidth=3;x.beginPath();x.moveTo(lx,ly);x.lineTo(lx-8,ly+25);x.lineTo(lx+5,ly+25);x.lineTo(lx-5,ly+50);x.stroke();
  x.strokeStyle='#FF0';x.lineWidth=1.5;x.beginPath();x.moveTo(lx,ly);x.lineTo(lx-8,ly+25);x.lineTo(lx+5,ly+25);x.lineTo(lx-5,ly+50);x.stroke();}}
  else if(fx==='star'){for(let i=0;i<16;i++){const sx=15+Math.random()*390,sy=15+Math.random()*390,ss=3+Math.random()*5;
  ln(sx-ss,sy,sx+ss,sy,1.5,'#FFD700');ln(sx,sy-ss,sx,sy+ss,1.5,'#FFD700');}}
}

// ============================================================
// MAIN GENERATE
// ============================================================

function G(){
  const ch=$('char'),bt=$('body'),fc=$('face'),ht=$('hat'),gr=$('gear'),
    sk=$('skin'),bg=$('bg'),sc=$('sock'),pg2=$('ping'),
    rc=+$('roach'),cn=+$('cone'),ef=$('fx'),
    rs=$('roachstyle'),cr=$('creature'),ti=$('title'),ps=$('pose');

  // Show/hide custom title input
  const ctr=document.getElementById('customTitleRow');
  ctr.style.display=ti==='custom'?'flex':'none';

  x.clearRect(0,0,420,420);
  drawBg(bg);

  const cx=210;

  if(ch==='gerald'){
    drawGeraldCone(cx,195,180,true,sc,pg2,gr==='glasses');

      const py=240;

      ln(cx+12,py+5,cx+18,py+5,1.2);
      x.fillStyle='#E890A5';
      for(let d=0;d<3;d++){x.beginPath();x.arc(cx+10+d*5,py+18+d*3,1.5,0,Math.PI*2);x.fill();}
    }
    drawFace(cx,170,192,12,fc,25);
    drawHat(cx,120,60,ht);
    for(let c=0;c<cn;c++)miniCone(20+(c/Math.max(cn,1))*380,350+Math.random()*22,28+Math.random()*10);
    for(let r=0;r<rc;r++)roach(20+Math.random()*380,325+Math.random()*65,1.2+Math.random()*1.3,Math.random()*Math.PI*2,rs);
    drawCreatures(cr);
    drawFx(ef);
    drawTitle(ti);
    gc++;$i('ct').textContent=gc;$i('st').textContent=`Gerald #${gc} — cone blessed — :23`;
    return;
  }

  if(ch==='pingle'){
    el(cx,210,48,52,'#F0A0B0');tex(cx,210,80,80,8);
    drawFace(cx,197,225,14,fc,30);
    ln(cx-48,210,cx-65,232,3);ln(cx+48,210,cx+65,228,3);
    ci(cx-65,232,5,'#F0A0B0');ci(cx+65,228,5,'#F0A0B0');
    ln(cx-16,260,cx-20,290,3);ln(cx+16,260,cx+20,290,3);
    if(sc!=='none'){
      const lc=sc==='mismatch'?'#7CCC2E':'#5B9BD5',rc2=sc==='mismatch'?'#5B9BD5':'#7CCC2E';
      x.beginPath();x.moveTo(cx-26,284);x.lineTo(cx-27,296);x.lineTo(cx-13,296);x.lineTo(cx-14,284);x.closePath();
      x.fillStyle=lc;x.fill();x.strokeStyle='#000';x.lineWidth=1.5;x.stroke();
      x.beginPath();x.moveTo(cx+14,284);x.lineTo(cx+13,296);x.lineTo(cx+27,296);x.lineTo(cx+26,284);x.closePath();
      x.fillStyle=rc2;x.fill();x.strokeStyle='#000';x.lineWidth=1.5;x.stroke();
    }
    drawHat(cx,170,35,ht);
    for(let r=0;r<rc;r++)roach(20+Math.random()*380,320+Math.random()*70,1.2+Math.random()*1.3,Math.random()*Math.PI*2,rs);
    for(let c=0;c<cn;c++)miniCone(20+(c/Math.max(cn,1))*380,345+Math.random()*25,26+Math.random()*10);
    drawCreatures(cr);
    drawFx(ef);
    drawTitle(ti);
    gc++;$i('ct').textContent=gc;$i('st').textContent=`Pingle #${gc} — smol but mighty`;
    return;
  }

  // Main goblin (pissmissle/pisstina)
  drawGoblin(cx,sk,bt,fc,ht,gr,sc,pg2,ch==='pisstina',ps);

  for(let r=0;r<rc;r++)roach(15+Math.random()*390,310+Math.random()*85,1.2+Math.random()*1.4,Math.random()*Math.PI*2,rs);
  for(let c=0;c<cn;c++)miniCone(15+(c/Math.max(cn,1))*390,350+Math.random()*22,24+Math.random()*12);
  drawCreatures(cr);
  drawFx(ef);
  drawTitle(ti);

  gc++;$i('ct').textContent=gc;
  $i('st').textContent=`${ch==='pisstina'?'Pisstina':'Pissmissle'} #${gc} — p/acc — :23`;
}

// ============================================================
// CREATURES
// ============================================================

function drawCreatures(cr){
  if(cr==='none')return;
  if(cr==='lobster'){
    for(let l=0;l<8;l++){
      drawLobster(30+Math.random()*360,340+Math.random()*55,1+Math.random()*0.8);
    }
  } else if(cr==='chick'){
    for(let c=0;c<6;c++){
      drawChick(40+Math.random()*340,330+Math.random()*60,2+Math.random()*1.5);
    }
  }
}

// ============================================================
// TITLE OVERLAY
// ============================================================

function drawTitle(ti){
  if(ti==='none')return;
  let text='';
  if(ti==='custom'){
    text=(document.getElementById('customTitle').value||'PISSTEK').toUpperCase();
  } else if(ti==='allin') text='PISSTEK ALL IN';
  else if(ti==='diamond') text='DIAMOND PISS';
  else if(ti==='survives') text='PISSTEK SURVIVES THE RUG';
  else if(ti==='ftw') text='PISSTEK FOR THE WIN!';
  if(!text)return;

  const fs=text.length>18?22:text.length>12?28:34;
  x.font=`900 ${fs}px Impact, "Arial Black", sans-serif`;
  x.textAlign='center';
  // Text outline/shadow for readability
  x.strokeStyle='#000';x.lineWidth=5;x.lineJoin='round';
  x.strokeText(text,210,42);
  // Fill
  x.fillStyle='#FFF';
  x.fillText(text,210,42);
  // Second stroke for crispness
  x.strokeStyle='#000';x.lineWidth=2;
  x.strokeText(text,210,42);
}

function $i(id){return document.getElementById(id);}
